# Requires pytest-gremlins >= 1.5.0 and pytest-xdist (when parallel: 'true')
name: 'pytest-gremlins'
description: 'Run mutation testing with pytest-gremlins — parallel workers, incremental cache, threshold enforcement'
author: 'mikelane'

branding:
  icon: 'zap'
  color: 'green'

inputs:
  parallel:
    description: "Distribute tests across workers via pytest-xdist (-n auto). Requires pytest-xdist. Set to 'false' for single-process runs."
    required: false
    default: 'true'
  cache:
    description: 'Enable IncrementalCache via actions/cache'
    required: false
    default: 'true'
  threshold:
    description: 'Minimum mutation score (0–100). Job fails below this.'
    required: false
    default: '0'
  args:
    description: 'Additional pytest-gremlins arguments'
    required: false
    default: ''

outputs:
  mutation-score:
    description: 'The mutation score as a percentage (0-100). Stub — score capture not yet implemented; deferred to BDD Bootstrap.'
    value: ${{ steps.run-gremlins.outputs.score }}

runs:
  using: 'composite'
  steps:
    - name: Restore gremlins cache
      if: inputs.cache == 'true'
      uses: actions/cache/restore@v4
      with:
        path: .gremlins_cache
        key: gremlins-${{ runner.os }}-${{ env.pythonLocation }}-${{ hashFiles('**/*.py', 'pyproject.toml') }}
        restore-keys: |
          gremlins-${{ runner.os }}-${{ env.pythonLocation }}-

    - name: Run mutation tests
      id: run-gremlins
      shell: bash
      run: |
        PARALLEL_ARGS=""
        if [ "${{ inputs.parallel }}" != "false" ]; then
          PARALLEL_ARGS="-n auto"
        fi
        THRESHOLD_ARGS=""
        if [ "${{ inputs.threshold }}" != "0" ]; then
          THRESHOLD_ARGS="--gremlin-threshold ${{ inputs.threshold }}"
        fi
        pytest --gremlins $PARALLEL_ARGS $THRESHOLD_ARGS ${{ inputs.args }}

    - name: Save gremlins cache
      id: cache-save
      if: always() && inputs.cache == 'true'
      continue-on-error: true
      uses: actions/cache/save@v4
      with:
        path: .gremlins_cache
        key: gremlins-${{ runner.os }}-${{ env.pythonLocation }}-${{ hashFiles('**/*.py', 'pyproject.toml') }}

    - name: Warn on cache save failure
      if: always() && inputs.cache == 'true' && steps.cache-save.outcome == 'failure'
      shell: bash
      run: echo "::warning::pytest-gremlins-action: cache save failed (missing cache write permission?). Mutation testing will continue but the next run will start cold."
