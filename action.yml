name: 'pytest-gremlins'
description: 'Run mutation testing with pytest-gremlins — parallel workers, incremental cache, threshold enforcement'
author: 'mikelane'

branding:
  icon: 'zap'
  color: 'green'

inputs:
  workers:
    description: 'Number of parallel gremlin workers (--gremlin-workers=N). Use "auto" to match CPU count.'
    required: false
    default: 'auto'
  cache:
    description: 'Enable IncrementalCache via actions/cache'
    required: false
    default: 'true'
  threshold:
    description: 'Minimum mutation score (0–100). Job fails below this.'
    required: false
    default: '0'
  args:
    description: 'Additional pytest-gremlins arguments'
    required: false
    default: ''

outputs:
  mutation-score:
    description: 'Mutation score percentage (0–100)'
    value: ${{ steps.run-gremlins.outputs.score }}

runs:
  using: 'composite'
  steps:
    - name: Restore gremlins cache
      if: inputs.cache == 'true'
      uses: actions/cache/restore@v4
      with:
        path: .gremlins_cache
        key: gremlins-${{ runner.os }}-${{ hashFiles('**/*.py', 'pyproject.toml') }}
        restore-keys: |
          gremlins-${{ runner.os }}-

    - name: Run mutation tests
      id: run-gremlins
      shell: bash
      run: |
        WORKERS_ARGS=""
        if [ "${{ inputs.workers }}" != "0" ] && [ -n "${{ inputs.workers }}" ]; then
          WORKERS_ARGS="--gremlin-workers=${{ inputs.workers }}"
        fi
        THRESHOLD_ARGS=""
        if [ "${{ inputs.threshold }}" != "0" ]; then
          THRESHOLD_ARGS="--gremlin-threshold ${{ inputs.threshold }}"
        fi
        pytest --gremlins $WORKERS_ARGS $THRESHOLD_ARGS ${{ inputs.args }}

    - name: Save gremlins cache
      if: inputs.cache == 'true' && always()
      uses: actions/cache/save@v4
      with:
        path: .gremlins_cache
        key: gremlins-${{ runner.os }}-${{ hashFiles('**/*.py', 'pyproject.toml') }}
