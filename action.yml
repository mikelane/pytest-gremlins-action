name: pytest-gremlins
description: >
  Run pytest-gremlins mutation testing in GitHub Actions with optional
  parallelism, incremental caching, and a mutation-score threshold gate.

branding:
  icon: zap
  color: yellow

inputs:
  parallel:
    description: >
      Enable parallel gremlin evaluation via pytest-xdist (-n auto).
      Set to 'false' to run sequentially.
    required: false
    default: 'true'
  cache:
    description: >
      Enable IncrementalCache so unchanged gremlins are skipped on
      subsequent runs.  Requires actions/cache to be available.
    required: false
    default: 'true'
  threshold:
    description: >
      Minimum mutation score (0–100) required for the step to succeed.
      The step exits non-zero when the score falls below this value.
    required: false
    default: '0'
  args:
    description: Additional arguments forwarded verbatim to pytest.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Restore IncrementalCache
      if: inputs.cache == 'true'
      uses: actions/cache@v4
      with:
        path: .gremlins_cache
        key: >-
          gremlins-${{ runner.os }}-${{ env.pythonLocation }}-${{
            hashFiles('**/*.py', 'pyproject.toml', 'setup.cfg', 'setup.py')
          }}
        restore-keys: |
          gremlins-${{ runner.os }}-${{ env.pythonLocation }}-

    - name: Run mutation tests
      id: gremlins
      shell: bash
      run: |
        EXTRA_ARGS=""
        if [ "${{ inputs.parallel }}" = "true" ]; then
          EXTRA_ARGS="$EXTRA_ARGS -n auto"
        fi
        if [ "${{ inputs.cache }}" = "true" ]; then
          EXTRA_ARGS="$EXTRA_ARGS --gremlin-cache"
        fi

        echo "Running: python -m pytest --gremlins${EXTRA_ARGS:+ $EXTRA_ARGS}${inputs_args:+ ${{ inputs.args }}}"

        python -m pytest --gremlins $EXTRA_ARGS ${{ inputs.args }} \
          2>&1 | tee ${RUNNER_TEMP}/gremlins-output.txt
        PYTEST_EXIT=${PIPESTATUS[0]}

        # Parse mutation score from "Zapped: N gremlins (XX%)" line.
        # Emit a diagnostic when the line is absent so format regressions are
        # visible rather than silently surfacing as a misleading score of 0.
        MUTATION_SCORE=$(python3 -c "
        import re, sys
        text = open('${RUNNER_TEMP}/gremlins-output.txt').read()
        m = re.search(r'Zapped: \d+ gremlins \((\d+(?:\.\d+)?)%\)', text)
        if m:
            print(m.group(1))
        else:
            print('pytest-gremlins: WARNING: could not parse mutation score from output; defaulting to 0', file=sys.stderr)
            print('0')
        ")
        if [ $? -ne 0 ]; then
          echo "pytest-gremlins: ERROR: score extraction script failed; defaulting score to 0"
          MUTATION_SCORE="0"
        fi

        echo "mutation-score=$MUTATION_SCORE" >> "$GITHUB_OUTPUT"
        echo "pytest-gremlins: Mutation score: ${MUTATION_SCORE}%"

        # Enforce threshold gate
        THRESHOLD="${{ inputs.threshold }}"
        if [ "$THRESHOLD" != "0" ]; then
          # Validate threshold is numeric before interpolating into Python to
          # prevent code injection via crafted input values.
          if [[ ! "$THRESHOLD" =~ ^[0-9]+([.][0-9]+)?$ ]]; then
            echo "Error: threshold must be a number between 0 and 100, got: $THRESHOLD"
            exit 1
          fi
          python3 -c "
        import sys
        score = float('$MUTATION_SCORE')
        threshold = float('$THRESHOLD')
        if score < threshold:
            print(f'pytest-gremlins: Mutation score {score}% is below threshold {threshold}%', file=sys.stderr)
            sys.exit(1)
          "
          GATE_EXIT=$?
          if [ "$GATE_EXIT" = "1" ]; then
            echo "pytest-gremlins: Threshold gate failed: score ${MUTATION_SCORE}% < required ${THRESHOLD}%"
            exit 1
          fi
        fi

        exit $PYTEST_EXIT

    - name: Save IncrementalCache
      if: always() && inputs.cache == 'true'
      uses: actions/cache@v4
      with:
        path: .gremlins_cache
        key: >-
          gremlins-${{ runner.os }}-${{ env.pythonLocation }}-${{
            hashFiles('**/*.py', 'pyproject.toml', 'setup.cfg', 'setup.py')
          }}

outputs:
  mutation-score:
    description: The mutation score percentage as a numeric string (e.g. "100.0").
    value: ${{ steps.gremlins.outputs.mutation-score }}
