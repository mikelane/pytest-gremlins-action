name: Bug Report
description: Something isn't working
labels: ["fix", "status: triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill this out. The more detail, the faster we fix it.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Run `...`
        2. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "e.g. v1.2.3"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        OS: ubuntu-latest
        Python: 3.12.2
        pytest-gremlins: 1.5.0
