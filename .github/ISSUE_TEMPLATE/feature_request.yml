name: Feature Request
description: Suggest a new capability or improvement
labels: ["feat", "status: triage"]
body:
  - type: markdown
    attributes:
      value: Check existing issues and discussions first — your idea may already be tracked.

  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What are you trying to do that is hard or impossible today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you have thought about.

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to open a PR for this
