name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate action.yml exists and is valid YAML
        run: |
          if [ -f action.yml ]; then
            python3 -c "import yaml; yaml.safe_load(open('action.yml'))" && echo "action.yml is valid YAML"
          else
            echo "action.yml not yet present — spike in progress"
          fi

      - name: Validate workflow YAML files
        run: |
          python3 -c "
          import yaml, pathlib, sys
          errors = []
          for f in pathlib.Path('.github/workflows').glob('*.yml'):
              try:
                  yaml.safe_load(f.read_text())
              except yaml.YAMLError as e:
                  errors.append(f'{f}: {e}')
          if errors:
              print('\n'.join(errors)); sys.exit(1)
          print(f'All workflow YAML files valid')
          "

  all-pass:
    name: all-pass
    runs-on: ubuntu-latest
    needs: [validate]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            exit 1
          fi
